      { id: 33, name: "Nacos", price: 25000, category: "Food and snack", isDrink: false, img: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?auto=format&fit=crop&w=300&q=80", available: false, badge: "Tex-Mex" }, // Contoh Habis
      { id: 34, name: "Ayam geprek", price: 25000, category: "Food and snack", isDrink: false, img: "https://images.unsplash.com/photo-1569229761022-02824b45450c?auto=format&fit=crop&w=300&q=80", available: true, badge: "Super Spicy" },
      { id: 35, name: "Chicken katsu", price: 28000, category: "Food and snack", isDrink: false, img: "https://images.unsplash.com/photo-1569229761022-02824b45450c?auto=format&fit=crop&w=300&q=80", available: true, badge: "Japanese Style" },
      { id: 36, name: "Garlic chicken", price: 28000, category: "Food and snack", isDrink: false, img: "https://images.unsplash.com/photo-1569229761022-02824b45450c?auto=format&fit=crop&w=300&q=80", available: true, badge: "Savory Garlic" }
    ];

    // Pemetaan kategori singkat untuk navigasi bilah kiri
    const categoryMapping = {
      "Signature": "Signature",
      "Milky base": "Milky Base",
      "Black coffe": "Black Coffee",
      "Refresher": "Refresher",
      "Non coffe": "Non Coffee",
      "Moctail coffe": "Mocktail",
      "Food and snack": "Snacks"
    };

    // Palet Warna Unik per Kategori (Menghasilkan kombinasi estetik layaknya gambar mockup)
    const categoryColors = {
      "Signature": "bg-[#00311e]",     // Hijau Tua (Brand)
      "Milky base": "bg-[#8B2626]",    // Merah Crimson
      "Black coffe": "bg-[#0D5C3A]",   // Hijau Jade
      "Refresher": "bg-[#B47B2E]",     // Cokelat Tanah / Orange Mustard
      "Non coffe": "bg-[#00311e]",     // Hijau Tua
      "Moctail coffe": "bg-[#8B2626]", // Merah Crimson
      "Food and snack": "bg-[#B47B2E]" // Cokelat Tanah
    };

    // State Aplikasi
    let cart = [];
    let currentCategory = "Signature";
    let activeItem = null;
    let selectedTemp = "Ice";
    let selectedQty = 1;

    // Inisialisasi awal saat load halaman
    window.addEventListener('DOMContentLoaded', () => {
      renderVerticalSidebar();
      renderHorizontalCatalog();
      initTableDropdown();
      updatePaymentSelection('Cash');
    });

    // Render Navigasi Bilah Kiri dengan rotasi teks (Vertical Text)
    function renderVerticalSidebar() {
      const categories = [...new Set(menuItems.map(item => item.category))];
      const container = document.getElementById('vertical-category-container');
      
      container.innerHTML = categories.map(cat => {
        const isActive = cat === currentCategory;
        const displayLabel = categoryMapping[cat] || cat;
        
        // Render dengan titik indikator aktif (seperti acuan gambar)
        return `
          <button onclick="setCategory('${cat}')" class="relative flex flex-col items-center group transition py-2">
            ${isActive ? '<span class="absolute -left-2 w-1.5 h-1.5 bg-darkgreen rounded-full"></span>' : ''}
            <span class="vertical-text text-[11px] font-extrabold tracking-widest uppercase transition-colors duration-200 ${isActive ? 'text-darkgreen font-black' : 'text-gray-400 hover:text-darkgreen/60'}">
              ${displayLabel}
            </span>
          </button>
        `;
      }).join('');
    }

    function setCategory(category) {
      currentCategory = category;
      renderVerticalSidebar();
      renderHorizontalCatalog();
    }

    // Render Katalog Menu Bergaya 3D Pop-out
    function renderHorizontalCatalog() {
      const filteredMenu = menuItems.filter(item => item.category === currentCategory);
      const container = document.getElementById('menu-list-container');
      const cardColor = categoryColors[currentCategory] || "bg-[#00311e]";
      
      container.innerHTML = filteredMenu.map(item => {
        const isSoldOut = !item.available;
        const availabilityBadge = isSoldOut 
          ? `<span class="bg-red-500 text-white font-extrabold text-[9px] px-2 py-0.5 rounded-full shadow-inner uppercase tracking-wider">Habis</span>` 
          : `<span class="bg-emerald-500/20 text-emerald-300 font-extrabold text-[9px] px-2 py-0.5 rounded-full uppercase tracking-wider">Tersedia</span>`;

        // Tampilan khusus jika stok habis (grayscale & sedikit transparan)
        const disabledClass = isSoldOut ? "opacity-60 grayscale-[40%]" : "";
        const buttonAction = isSoldOut ? "" : `onclick="openCustomModal(${item.id})"`;

        return `
          <div class="relative ${cardColor} rounded-3xl p-5 pl-8 text-cream shadow-xl flex flex-col justify-between h-36 overflow-visible transition duration-300 hover:scale-[1.02] ${disabledClass}">
            
            <!-- Tombol Tambah Mengambang di kiri batas kartu -->
            <button ${buttonAction} 
              class="absolute left-[-16px] top-1/2 transform -translate-y-1/2 w-8 h-8 rounded-xl bg-white text-darkgreen font-black flex items-center justify-center shadow-lg active:scale-90 transition hover:bg-cream ${isSoldOut ? 'cursor-not-allowed opacity-50' : ''}">
              ${isSoldOut ? '×' : '+'}
            </button>

            <!-- Bagian Atas Kartu -->
            <div class="flex justify-between items-start pr-20">
              <div>
                <span class="text-[9px] uppercase tracking-widest font-extrabold opacity-75">${item.badge}</span>
                <h3 class="font-extrabold text-base leading-tight mt-0.5">${item.name}</h3>
              </div>
              <div class="flex flex-col items-end gap-1.5">
                ${availabilityBadge}
              </div>
            </div>

            <!-- Bagian Bawah Kartu (Harga) -->
            <div class="mt-auto">
              <span class="text-lg font-black tracking-wider">${formatIDR(item.price)}</span>
            </div>

            <!-- Foto Produk Pop-out (Melayang Melewati Batas Kartu Kanan) -->
            <div class="absolute right-[-14px] bottom-[-6px] w-28 h-32 flex items-end justify-center pointer-events-none overflow-visible">
              <img src="${item.img}" alt="${item.name}" class="w-full h-full object-contain filter drop-shadow-[0_12px_12px_rgba(0,0,0,0.45)]">
            </div>

          </div>
        `;
      }).join('');
    }

    // Inisialisasi dropdown nomor meja
    function initTableDropdown() {
      const select = document.getElementById('table-number');
      for (let i = 1; i <= 20; i++) {
        const option = document.createElement('option');
        option.value = i;
        option.textContent = `Meja ${i}`;
        select.appendChild(option);
      }
    }

    function formatIDR(num) {
      return 'Rp ' + num.toLocaleString('id-ID');
    }

    // --- LOGIC MODAL KUSTOMISASI ---
    function openCustomModal(itemId) {
      const item = menuItems.find(i => i.id === itemId);
      if (!item || !item.available) return; // Mencegah pemesanan menu yang habis

      activeItem = item;
      selectedQty = 1;
      selectedTemp = "Ice";

      document.getElementById('modal-item-name').innerText = item.name;
      document.getElementById('modal-item-price').innerText = formatIDR(item.price);
      document.getElementById('modal-item-qty').innerText = selectedQty;
      document.getElementById('modal-item-note').value = "";

      const tempContainer = document.getElementById('temp-option-container');
      if (item.isDrink) {
        tempContainer.classList.remove('hidden');
        updateTempSelection('Ice');
      } else {
        tempContainer.classList.add('hidden');
        selectedTemp = null;
      }

      const modal = document.getElementById('custom-modal');
      modal.classList.remove('hidden');
      setTimeout(() => {
        modal.classList.remove('opacity-0');
        modal.querySelector('div').classList.remove('translate-y-full');
      }, 50);
    }

    function closeCustomModal() {
      const modal = document.getElementById('custom-modal');
      modal.classList.add('opacity-0');
      modal.querySelector('div').classList.add('translate-y-full');
      setTimeout(() => {
        modal.classList.add('hidden');
        activeItem = null;
      }, 300);
    }

    function updateTempSelection(temp) {
      selectedTemp = temp;
      const lblHot = document.getElementById('lbl-hot');
      const lblIce = document.getElementById('lbl-ice');

      if (temp === 'Hot') {
        lblHot.className = "flex items-center justify-center border-2 border-darkgreen rounded-xl py-3 px-4 cursor-pointer bg-darkgreen text-cream transition font-bold text-sm shadow-sm";
        lblIce.className = "flex items-center justify-center border-2 border-darkgreen/15 rounded-xl py-3 px-4 cursor-pointer bg-white text-darkgreen transition font-bold text-sm";
      } else {
        lblIce.className = "flex items-center justify-center border-2 border-darkgreen rounded-xl py-3 px-4 cursor-pointer bg-darkgreen text-cream transition font-bold text-sm shadow-sm";
        lblHot.className = "flex items-center justify-center border-2 border-darkgreen/15 rounded-xl py-3 px-4 cursor-pointer bg-white text-darkgreen transition font-bold text-sm";
      }
    }

    function adjustModalQty(delta) {
      selectedQty = Math.max(1, selectedQty + delta);
      document.getElementById('modal-item-qty').innerText = selectedQty;
    }

    function confirmAddToCart() {
      const note = document.getElementById('modal-item-note').value.trim();
      
      const cartItem = {
        id: Date.now(),
        menuId: activeItem.id,
        name: activeItem.name,
        price: activeItem.price,
        qty: selectedQty,
        temp: selectedTemp,
        note: note
      };

      cart.push(cartItem);
      updateCartStatus();
      closeCustomModal();
    }

    // --- LOGIC SISTEM KERANJANG ---
    function updateCartStatus() {
      const cartBar = document.getElementById('cart-bar');
      const cartBarTotal = document.getElementById('cart-bar-total');
      const cartBarCount = document.getElementById('cart-bar-count');

      const totalItems = cart.reduce((acc, item) => acc + item.qty, 0);
      const subtotal = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);

      if (totalItems > 0) {
        cartBarCount.innerText = totalItems;
        cartBarTotal.innerText = formatIDR(subtotal);
        cartBar.classList.remove('translate-y-full');
      } else {
        cartBar.classList.add('translate-y-full');
      }
    }

    function toggleCartModal(show) {
      const modal = document.getElementById('cart-modal');
      if (show) {
        renderCartList();
        updateSummary();
        modal.classList.remove('hidden');
        setTimeout(() => {
          modal.classList.remove('opacity-0');
          modal.querySelector('div').classList.remove('translate-y-full');
        }, 50);
      } else {
        modal.classList.add('opacity-0');
        modal.querySelector('div').classList.add('translate-y-full');
        setTimeout(() => {
          modal.classList.add('hidden');
        }, 300);
      }
    }

    function renderCartList() {
      const container = document.getElementById('cart-items-list');
      if (cart.length === 0) {
        container.innerHTML = `<p class="text-sm text-center text-gray-500 py-6">Keranjang belanja kosong.</p>`;
        return;
      }

      container.innerHTML = cart.map(item => {
        const tempText = item.temp ? ` • [${item.temp}]` : '';
        const noteText = item.note ? `<p class="text-[11px] text-orange-700 italic mt-0.5">"${item.note}"</p>` : '';
        
        return `
          <div class="flex items-center justify-between gap-3 bg-white p-4 rounded-2xl border border-darkgreen/5 shadow-sm">
            <div class="flex-1">
              <span class="font-bold text-sm text-darkgreen block leading-tight">${item.name}</span>
              <span class="text-xs font-semibold text-emerald-800">${formatIDR(item.price)}${tempText}</span>
              ${noteText}
            </div>
            <div class="flex items-center border border-darkgreen/10 rounded-xl bg-gray-50 p-0.5">
              <button onclick="adjustCartQty(${item.id}, -1)" class="w-8 h-8 flex items-center justify-center font-bold text-darkgreen hover:bg-darkgreen/5 rounded-lg">-</button>
              <span class="w-8 text-center text-xs font-bold text-darkgreen">${item.qty}</span>
              <button onclick="adjustCartQty(${item.id}, 1)" class="w-8 h-8 flex items-center justify-center font-bold text-darkgreen hover:bg-darkgreen/5 rounded-lg">+</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function adjustCartQty(cartId, delta) {
      const index = cart.findIndex(item => item.id === cartId);
      if (index !== -1) {
        cart[index].qty += delta;
        if (cart[index].qty <= 0) {
          cart.splice(index, 1);
        }
      }
      renderCartList();
      updateSummary();
      updateCartStatus();
      if (cart.length === 0) {
        toggleCartModal(false);
      }
    }

    function updateSummary() {
      const subtotal = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
      document.getElementById('summary-subtotal').innerText = formatIDR(subtotal);
      document.getElementById('summary-total').innerText = formatIDR(subtotal);
    }

    function updatePaymentSelection(method) {
      const payCash = document.getElementById('pay-cash');
      const payQris = document.getElementById('pay-qris');
      const qrisPanel = document.getElementById('qris-panel');

      if (method === 'Cash') {
        payCash.className = "flex flex-col items-center justify-center border-2 border-darkgreen rounded-xl py-3 px-2 cursor-pointer bg-darkgreen text-cream transition";
        payQris.className = "flex flex-col items-center justify-center border-2 border-darkgreen/15 rounded-xl py-3 px-2 cursor-pointer bg-white text-darkgreen transition";
        qrisPanel.classList.add('hidden');
      } else {
        payQris.className = "flex flex-col items-center justify-center border-2 border-darkgreen rounded-xl py-3 px-2 cursor-pointer bg-darkgreen text-cream transition";
        payCash.className = "flex flex-col items-center justify-center border-2 border-darkgreen/15 rounded-xl py-3 px-2 cursor-pointer bg-white text-darkgreen transition";
        qrisPanel.classList.remove('hidden');
      }
    }

    // --- PROSES EXPORT WHATSAPP ---
    function checkoutToWhatsApp() {
      const tableSelect = document.getElementById('table-number');
      const tableNumber = tableSelect.value;
      const paymentMethod = document.querySelector('input[name="payment-method"]:checked').value;

      if (!tableNumber) {
        alert("Harap pilih nomor meja terlebih dahulu.");
        tableSelect.focus();
        return;
      }

      if (cart.length === 0) {
        alert("Keranjang Anda masih kosong.");
        return;
      }

      let message = `*HALO SATU . SATU!* ☕️\n`;
      message += `Berikut rincian pesanan baru saya:\n\n`;
      message += `--------------------------------------\n`;

      cart.forEach((item, index) => {
        const tempInfo = item.temp ? ` [${item.temp}]` : '';
        message += `${index + 1}. *${item.name}* (${item.qty}x)${tempInfo}\n`;
        message += `   Harga: ${formatIDR(item.price * item.qty)}\n`;
        if (item.note) {
          message += `   _Catatan: ${item.note}_\n`;
        }
        message += `\n`;
      });

      const totalBayar = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);

      message += `--------------------------------------\n`;
      message += `📍 *No. Meja:* Meja ${tableNumber}\n`;
      message += `💳 *Pembayaran:* ${paymentMethod}\n`;
      message += `💰 *Total Bayar:* *${formatIDR(totalBayar)}*\n\n`;
      
      if (paymentMethod === 'QRIS') {
        message += `_Bukti pembayaran QRIS dilampirkan setelah pesan ini._\n\n`;
      }
      message += `Mohon segera diproses, terima kasih! ✨`;

      const encodedMessage = encodeURIComponent(message);
      const waUrl = `https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodedMessage}`;

      window.open(waUrl, '_blank');
    }
  </script>
</body>
